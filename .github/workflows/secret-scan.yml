name: Secret scan

# Phase B baseline (PR2):
# Scans the repo with gitleaks. Always runs with --redact so secret values
# never appear in CI logs. PR scans look only at the diff range; pushes scan
# the full tree.
#
# Blocking: yes (workflow fails if any leak is found in scope).
# Rationale: the diff for new PRs should never legitimately contain secrets;
# false positives can be silenced via .gitleaks.toml (added later if needed).
#
# Notes:
# - We do NOT use the official gitleaks-action GitHub Action because it
#   requires a license key for org repos; the open-source binary is run
#   directly via curl install (idempotent, ~2s) which is sufficient here.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for diff scan)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.18.4"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan PR diff (gitleaks --redact)
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          # Compare PR head against the base branch. --redact ensures values
          # are never echoed; --no-banner keeps logs short.
          gitleaks detect \
            --source . \
            --redact \
            --no-banner \
            --log-opts="--no-merges ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

      - name: Scan working tree (gitleaks --redact, no-git)
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          gitleaks detect \
            --source . \
            --redact \
            --no-banner \
            --no-git
