# Dependabot configuration for ham (Phase A baseline).
#
# Goals:
# - Keep deps fresh without PR spam.
# - Group minor/patch bumps to reduce review overhead.
# - Cover all three apps (backend pip, frontend npm, desktop npm) and CI actions.
#
# Notes:
# - pip stays weekly; npm and github-actions use monthly cadence to cut major-PR churn.
# - Major bumps for toolchain packages (TypeScript, Vite, Electron, etc.) are ignored
#   here so they are upgraded deliberately (security advisories still surface via
#   GitHub dependency security features).
# - We do NOT enable security-only updates here — GitHub does that automatically
#   when secret-scanning + dependency-graph are on (enabled in Phase B).

version: 2

updates:
  # Backend Python (runtime + dev requirements)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels: ["dependencies", "area:backend"]
    groups:
      python-minor-and-patch:
        update-types: ["minor", "patch"]

  # Frontend (Vite + React workspace)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "monthly"
      time: "08:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(deps,frontend)"
      include: "scope"
    labels: ["dependencies", "area:frontend"]
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    groups:
      frontend-minor-and-patch:
        update-types: ["minor", "patch"]

  # Desktop (Electron shell)
  - package-ecosystem: "npm"
    directory: "/desktop"
    schedule:
      interval: "monthly"
      time: "08:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(deps,desktop)"
      include: "scope"
    labels: ["dependencies", "area:desktop"]
    ignore:
      - dependency-name: "electron"
        update-types: ["version-update:semver-major"]
      - dependency-name: "electron-builder"
        update-types: ["version-update:semver-major"]
    groups:
      desktop-minor-and-patch:
        update-types: ["minor", "patch"]

  # GitHub Actions used in workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "08:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    labels: ["dependencies", "area:ci"]
    groups:
      actions-minor-and-patch:
        update-types: ["minor", "patch"]
