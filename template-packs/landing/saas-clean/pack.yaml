id: landing/saas-clean
name: SaaS Clean Landing
app_types:
  - landing
prompt_signals:
  - saas
  - startup
  - b2b
source_libraries:
  - react
  - tailwindcss
source_strategy: HAM-authored starter inspired by approved copy-paste UI patterns
source_audit_status: ham_authored
third_party_code_included: false
copy_paste_safe: true
license_notes: >-
  Original HAM-authored SaaS landing starter. No third-party template code included.
license:
  id: ham-authored-internal
  name: HAM Authored Internal Starter
  commercial_use_allowed: true
  redistribution_allowed: true
  attribution_required: false
dependencies:
  react: ^18.3.1
  react-dom: ^18.3.1
dev_dependencies:
  "@vitejs/plugin-react": ^4.3.4
  tailwindcss: ^3.4.15
  typescript: ^5.6.3
  vite: ^5.4.11
required_files:
  - package.json
  - src/main.tsx
  - src/index.css
  - src/App.tsx
quality_gates:
  required_sections:
    - hero
    - services
    - cta
  min_tailwind_class_tokens: 10
ai_directive: remix_moderately
