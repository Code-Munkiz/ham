id: validator.resource-list-readable
kind: validator
name: Resource list readable
status: proposed
schema_version: "0.1"

description: >
  Ensures project/team/resource list or table is semantic, legible, and bounded.

non_template_statement: Conceptual validator only.

applies_to:
  - app.saas-dashboard-core

