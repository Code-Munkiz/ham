# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: validator.responsive-a11y-basics
kind: validator
name: Responsive and accessibility basics
status: proposed
schema_version: "0.1"

description: >
  Checks responsive stacking and semantic accessibility fundamentals for static app-shell dashboard UIs.

non_template_statement: Conceptual validator only.

applies_to:
  - app.saas-dashboard-core
  - app.admin-dashboard-core

validates_modules:
  - section.saas-responsive-structure
  - component.app-shell
  - component.resource-list
  - section.admin-responsive-structure
  - component.admin-shell
  - component.resource-index-table
  - component.audit-log-list

severity: blocking
runner: conceptual
check_type: conceptual

pass_conditions:
  - "Semantic header/nav/main landmarks and semantic resource list/table structure are present (table preferred)"
  - "Layout remains usable at 360px without page-level horizontal scroll"
  - "Focus visibility and text-plus-style status communication are preserved"

fail_conditions:
  - "Landmark-free layout, inaccessible heading/navigation structure, or div-soup resource pseudo-table"
  - "Mobile layout overflows horizontally or collapses readability"

recovery_playbooks:
  - recovery.dead-nav-shell
