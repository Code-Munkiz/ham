# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: validator.admin-shell-bounds
kind: validator
name: Admin shell bounds
status: proposed
schema_version: "0.1"

description: >
  Ensures admin shell exists but stays bounded to one static overview surface.

non_template_statement: Conceptual validator only.

applies_to:
  - app.admin-dashboard-core

validates_modules:
  - section.admin-app-shell
  - component.admin-shell

severity: blocking
runner: conceptual
check_type: conceptual

pass_conditions:
  - "Shell has sidebar/topbar/main with one overview surface"
  - "Navigation remains shallow and honest"

fail_conditions:
  - "No shell structure or no main overview region"
  - "Deep multi-route app behavior implied in this static lane"

recovery_playbooks:
  - recovery.auth-backend-drift
