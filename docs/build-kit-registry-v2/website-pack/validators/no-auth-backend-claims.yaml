# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: validator.no-auth-backend-claims
kind: validator
name: No auth/backend claims
status: proposed
schema_version: "0.1"

description: >
  Prevents claims or UI cues that imply real auth, account sessions, backend APIs, or databases.

non_template_statement: Conceptual validator only.

applies_to:
  - app.saas-dashboard-core

validates_modules:
  - section.saas-workspace-context
  - component.workspace-switcher

severity: blocking
runner: conceptual
check_type: conceptual

pass_conditions:
  - "Workspace/account/project selector is clearly placeholder/local context"
  - "No login/signup/session/backend/API/database implementation claims"

fail_conditions:
  - "Copy implies real authentication or tenant account system"
  - "Copy implies live backend fetch, API sync, or database persistence"

recovery_playbooks:
  - recovery.auth-drift
