# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: validator.no-lorem-dead-cta
kind: validator
name: No lorem or dead CTA
status: proposed
schema_version: "0.1"

description: >
  No lorem ipsum; CTAs are real links or handlers — no dead href="#" anchors and
  no fake submit forms.

non_template_statement: Conceptual validator only.

applies_to:
  - site.landing-page-core

severity: blocking
runner: conceptual
check_type: conceptual

pass_conditions:
  - "No lorem ipsum strings in visible copy"
  - "Primary CTAs href or onClick documented — not inert submit to nowhere"
  - "CTA hrefs are real in-page anchors or handlers — no dead href=\"#\""
  - "No fake form submission; static CTA copy when there is no live form handling"

fail_conditions:
  - "Lorem ipsum placeholder text"
  - "Submit button with no action pretending to work"
  - "Meaningful CTA using href=\"#\" (dead anchor)"
  - "Form that appears to submit but has no handling"

recovery_playbooks:
  - recovery.weak-cta
