# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: pack.site
kind: registry_pack
name: Website Pack
status: proposed
schema_version: "0.1"

description: >
  Root manifest for Build Registry v2 Website Pack. Indexes marketing/landing-page and
  dashboard/app-surface playbooks: site.landing-page-core and site.dashboard-ui-core
  (routed when flagged), plus app.saas-dashboard-core (routed when flagged) and
  app.admin-dashboard-core (routed when flagged), plus schema-only
  app.sales-ops-dashboard-core (not routed). Separate from game-pack; generative guidance
  only — no templates or starter source.

non_template_statement: >
  Registry index and compose defaults only. Does not ship landing page or dashboard
  starters, cloned templates, or executable validators. HAM generates custom code from
  composed playbook context when wired — never from checked-in templates.

