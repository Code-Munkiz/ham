# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: recovery.section-repetition
kind: recovery_playbook
name: Fix repetitive sections
status: proposed
schema_version: "0.1"

description: >
  Repairs identical feature cards or copy-paste section blocks.

non_template_statement: Conceptual recovery only.

max_attempts: 2

applies_to:
  - site.landing-page-core

repairs_validators:
  - validator.copy-specificity
  - validator.anti-slop-patterns

steps:
  - id: step.diversify_headings
    action: diversify_headings
    detail: "Unique heading per feature block"
  - id: step.vary_layout
    action: vary_layout
    detail: "Adjust spacing or column count to break sameness"
  - id: step.re_validate
    action: re_validate
    detail: "Re-run validator.copy-specificity"

user_facing_summary: >
  I differentiated the feature sections so each block says something distinct.
