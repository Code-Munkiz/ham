# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: recovery.crm-api-drift
kind: recovery_playbook
name: Fix CRM/API drift
status: proposed
schema_version: "0.1"

description: >
  Repairs CRM/API/backend integration drift.

non_template_statement: Conceptual recovery only.

max_attempts: 2

applies_to:
  - app.sales-ops-dashboard-core

repairs_validators:
  - validator.no-crm-api-backend-claims

steps:
