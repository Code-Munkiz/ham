    action: strip_integration_claims
    detail: "Remove CRM/API/database sync claims and cues"
  - id: step.restate_local_data
    action: restate_local_data
    detail: "Reassert local/static sample data"
  - id: step.re_validate
    action: re_validate
    detail: "Re-run CRM/API/backend validator"
