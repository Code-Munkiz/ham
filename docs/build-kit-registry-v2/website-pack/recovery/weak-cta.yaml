description: >
  Repairs generic or competing CTAs and dead submit buttons.

non_template_statement: Conceptual recovery only.

max_attempts: 2

applies_to:
  - site.landing-page-core

repairs_validators:
  - validator.cta-clarity
  - validator.no-lorem-dead-cta

steps:
