    detail: "Primary CTA label matches offer action"
  - id: step.demote_secondary
    action: demote_secondary
    detail: "Secondary link styled as text link not equal button"
  - id: step.fix_dead_submit
    action: fix_dead_submit
    detail: "Replace fake form submit with link or documented handler"

user_facing_summary: >
  I clarified the main call to action so it is obvious what happens when you click.
