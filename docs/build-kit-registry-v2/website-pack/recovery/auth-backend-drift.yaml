# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: recovery.auth-backend-drift
kind: recovery_playbook
name: Fix auth/backend drift
status: proposed
schema_version: "0.1"

description: >
  Removes auth/backend claims and restores static admin-preview boundaries.

non_template_statement: Conceptual recovery only.

max_attempts: 2

applies_to:
  - app.admin-dashboard-core

repairs_validators:
  - validator.no-auth-backend-claims
  - validator.admin-shell-bounds

steps:
