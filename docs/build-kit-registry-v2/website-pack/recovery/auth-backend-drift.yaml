    action: remove_auth_backend_claims
    detail: "Strip auth/backend implementation language"
  - id: s2
    action: restate_static_boundaries
    detail: "Restate local/static demo-mode boundaries"
  - id: s3
    action: re_validate
    detail: "Re-run boundary validators"

user_facing_summary: >
  I removed auth/backend implications and kept a static local preview.
