# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: component.status-card
kind: component_contract
name: Admin status card contract
status: proposed
schema_version: "0.1"

description: >
  Bounded status metric card: label, value, unit, and optional trend/status indicator.

non_template_statement: Layout contract only — not a copy-paste card component.

applies_to:
  - app.admin-dashboard-core

depends_on: []

binds_mechanics:
  - section.admin-overview-status

expected_props:
  - label: string
  - value: string | number
  - unit: string | null
  - status: "neutral | positive | warning | negative | null"

accessibility_notes:
  - "Label is a real heading or labeled text; value is readable"
  - "Status conveyed with text/icon plus color — never color alone"

responsive_notes:
  - "Cards wrap to one or two per row on narrow viewports"
