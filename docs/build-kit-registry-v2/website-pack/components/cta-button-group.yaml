# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: component.cta-button-group
kind: component_contract
name: CTA button group contract
status: proposed
schema_version: "0.1"

description: >
  Primary and optional secondary call-to-action controls.

non_template_statement: Layout contract only.

applies_to:
  - site.landing-page-core

binds_mechanics:
  - section.cta-band
  - section.final-conversion

expected_props:
  - primaryLabel: string
  - primaryHref: string
  - secondaryLabel: string | null
  - secondaryHref: string | null

guidance:
  - "Render the secondary CTA when the prompt requests primary AND secondary — do not drop it"
  - "primaryHref / secondaryHref are real in-page anchors (#features, #faq, #contact, #waitlist) or handlers — never href=\"#\""
  - "Meaningful labels on both CTAs; no fake submit-to-nowhere behavior"

accessibility_notes:
  - "Use button or anchor — not inert div click targets"
  - "Primary visually dominant; secondary subdued"

responsive_notes:
  - "Full-width primary button on mobile when appropriate"
