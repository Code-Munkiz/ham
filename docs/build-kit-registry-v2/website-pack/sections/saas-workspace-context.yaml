# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: section.saas-workspace-context
kind: section
name: SaaS workspace context section
status: proposed
schema_version: "0.1"

description: >
  Workspace/account/project context area with static selector placeholder and context chips.

non_template_statement: Section playbook only — not a checked-in account switcher widget.

applies_to:
  - app.saas-dashboard-core

depends_on:
