guidance:
  - "REQUIRED as a distinct section when the prompt requests social proof, trust, testimonials, or credibility — do not silently omit it"
  - "Acceptable forms: testimonial strip, logo/trust row, credibility stats, quote cards, or adoption proof"
  - "Structured quotes or stats — not filler lorem names"
