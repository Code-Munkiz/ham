# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: section.landing-hero
kind: section
name: Landing hero section
status: proposed
schema_version: "0.1"

description: >
  Above-the-fold hero: headline, supporting subhead, primary CTA, optional secondary action.

non_template_statement: Section playbook only — not a checked-in hero component.

applies_to:
  - site.landing-page-core

depends_on: []

binds_components:
  - component.hero-block

guidance:
  - "Headline names audience or outcome — avoid vague revolution copy"
  - "Primary CTA with a specific label tied to the offer (not a bare \"Get Started\")"
  - "Include a secondary CTA when the prompt asks for primary AND secondary — keep it visually de-emphasized but present (e.g. \"See how it works\", \"View examples\", \"Read the playbook\")"
  - "Do not collapse requested dual CTAs into a single button"
  - "CTA targets are real anchors or handlers — never href=\"#\""
  - "Hero background or imagery supports narrative — not decorative noise"
