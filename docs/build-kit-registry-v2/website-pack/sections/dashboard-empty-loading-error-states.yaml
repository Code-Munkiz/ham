# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: section.dashboard-empty-loading-error-states
kind: section
name: Dashboard empty/loading/error states section
status: proposed
schema_version: "0.1"

description: >
  State guidance for any async-looking region (charts, table, filtered views): an empty
  state, a loading state, and an error state — presented honestly over static sample data.

non_template_statement: Section playbook only — not a checked-in state component.

applies_to:
  - site.dashboard-ui-core

depends_on:
  - section.dashboard-table-region

binds_components:
  - component.status-badge

guidance:
  - "Any region implying fetched data defines empty, loading, and error presentation"
  - "Empty explains what is missing; loading is a bounded skeleton — no infinite spinner"
  - "Error copy is honest — does not pretend a backend exists for MVP"
