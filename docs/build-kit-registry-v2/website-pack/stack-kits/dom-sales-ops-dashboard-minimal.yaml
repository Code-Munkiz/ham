# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: stack.dom-sales-ops-dashboard-minimal
kind: stack_kit
name: DOM-native minimal sales ops dashboard stack
status: proposed
schema_version: "0.1"

description: >
  Static sales/revenue operations dashboard stack: semantic DOM layout, responsive
  structure, and coherent local sample data.

non_template_statement: >
  Stack playbook only. No checked-in starter app or framework template.

applies_to:
  - app.sales-ops-dashboard-core
  - tag:dom-sales-ops-dashboard

capabilities:
  - local-state
  - dom-rendering
  - semantic-landmarks
  - responsive-grid
  - static-sample-data
  - no-network

guidance:
  - "Use one bounded sales ops shell with semantic structure and local/static data only."
  - "Prefer readable KPI, table, and chart regions over dense component soup."

accessibility_baseline:
  - "One h1 for page title and descriptive h2/h3 region headings"
  - "Tables, filters, cards, and queues have clear labels and keyboard focus states"
  - "Status and risk signals use text plus visual styling, never color alone"

mobile_baseline:
  - "Usable at 360px without page-level horizontal scrolling"
  - "Summary cards and queue/table regions stack cleanly on narrow viewports"
