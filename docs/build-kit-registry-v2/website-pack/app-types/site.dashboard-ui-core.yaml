# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: site.dashboard-ui-core
kind: app_type
name: Dashboard UI core
status: proposed
schema_version: "0.1"

description: >
  Read-only / mostly static dashboard overview playbook: a dashboard shell with a bounded
  KPI row, one or two basic line/bar charts, a simple detail table, optional static/local
  filters, empty/loading/error state guidance, responsive layout, and accessibility
  semantics. No backend, auth, accounts, CRUD, payments, admin permissions, analytics
  workbench, real-time streams, maps, or trading/order-book density.

non_template_statement: >
  Generative playbook only. No checked-in dashboard templates, admin-panel clone baselines,
  or starter source trees. HAM composes guidance — never copies repo-native dashboard kits.

legacy_v1_fallback: generic

safety_constraints:
  - no-network-egress-for-mvp
  - no-eval
  - no-user-accounts-for-mvp
  - no-backend-api-for-mvp
  - no-crud-mutation-for-mvp
  - no-payment-processing-for-mvp
  - no-admin-permissions-for-mvp
  - no-real-time-streams-for-mvp
  - dom-native-ui-only-for-mvp
  - static-sample-data-only-for-mvp

guidance:
  - "Information architecture: inverted pyramid — KPIs on top, charts in the middle, table below"
  - "KPI row bounded to 3–5 differentiated cards with label, value, and unit — no card spam"
  - "Charts: 1–2 basic line/bar with labeled axes and units — never chrome over arbitrary arrays"
  - "Filters/search only if locally mapped to a visible region — no dead controls"
  - "Sample data is meaningful for the domain — no filler arrays; no fake backend/live-data claims"
  - "Async-looking regions define empty, loading, and error states honestly"
  - "Semantic header/nav/main + single h1; responsive stacking; status via text/icon, not color alone"

default_assumptions:
  - "Single dashboard page; one overview surface"
  - "Static local sample data; no API fetch for MVP"
  - "12-column responsive layout; KPI row wraps and regions stack on mobile"
  - "Topnav shell; no deep sidebar navigation for MVP"

hard_constraints:
  - no-template-cloning
  - no-backend-api-for-mvp
  - no-auth-or-accounts-for-mvp
  - no-crud-forms-for-mvp
  - no-payments-or-billing-management-for-mvp
  - no-admin-permissions-for-mvp
  - no-analytics-workbench-or-ad-hoc-query-for-mvp
  - no-real-time-streams-for-mvp
  - no-maps-or-geospatial-for-mvp
  - no-trading-or-order-book-density-for-mvp
  - no-fake-meaningless-chart-data
  - no-dead-filter-or-search-control
  - no-color-only-status-meaning

soft_defaults:
  - dashboard shell with header and main regions
  - top KPI row with 3–5 cards
  - one to two basic line/bar charts
  - one simple detail table
  - optional local/static filter bar
  - empty/loading/error state examples

user_overridable:
  - domain and KPI labels
  - KPI card count within the 3–5 cap
  - chart count within the 1–2 cap
  - color palette and typography mood
  - whether a static filter bar appears
  - table columns within a readable bound

clarify_if_changed:
  - adding a backend, API, or live database
  - adding authentication, accounts, or admin permissions
  - adding CRUD forms or record mutation
  - adding an analytics workbench or ad-hoc querying
  - adding real-time streaming or trading/order-book density

out_of_scope_unless_explicit:
  - backend APIs or databases
  - auth, accounts, or admin user management
  - CRUD create/update/delete forms
  - payments or billing management
  - analytics workbench or ad-hoc query/pivot tooling
  - CRM or project-management boards
  - fintech/trading dashboards or order books
  - real-time monitoring or streaming
  - maps or geospatial operations
  - game HUD overlays

conflict_policy:
  user_explicit_overrides_soft_defaults: true
  safety_constraints_override_user_request: true
  core_loop_conflicts_require_clarification: true
  out_of_scope_items_require_explicit_request: true
  fallback_to_v1_or_generic_when_recipe_no_longer_fits: true

user_prompt_examples:
  positive:
    - "Build a read-only dashboard overview with KPI cards, simple charts, a table, filters, empty states, and responsive layout."
    - "Create a static dashboard UI for a SaaS metrics overview with KPIs, line chart, bar chart, recent activity table, and accessible headings."
    - "Build a local sample-data dashboard with status cards, trend charts, a simple table, and no backend."
    - "Create a dashboard overview page with bounded KPI cards, meaningful sample data, loading/empty/error states, and responsive stacking."
  negative:
    - "Build an admin dashboard with user management and CRUD forms."
    - "Build an analytics workbench with ad-hoc queries and pivot tables."
    - "Build a trading dashboard with order books and candlestick charts."
    - "Build a real-time operations dashboard with maps."
    - "Build a dashboard with auth, accounts, and backend API."
    - "Build a CRM dashboard with leads, tasks, and kanban boards."
    - "Build a landing page that shows a fake dashboard screenshot."
    - "Build a game HUD."

intent_signals:
  note: "For future routing only — not wired in intent.py"
  weak_alone:
    - dashboard
    - app
    - admin
    - analytics
    - metrics
    - chart
    - table
    - data
    - report
    - portal
    - overview
  positive_combined:
    - "read-only dashboard + KPI cards + chart + table"
    - "dashboard overview + metrics + simple data table + no backend"
    - "static dashboard + status cards + trend charts + responsive"

stack_kit_id: stack.dom-dashboard-minimal

composed_modules:
  stack_kit_id: stack.dom-dashboard-minimal
  mechanics:
    - section.dashboard-shell
    - section.dashboard-kpi-row
    - section.dashboard-chart-region
    - section.dashboard-table-region
    - section.dashboard-filter-bar
    - section.dashboard-empty-loading-error-states
    - section.dashboard-responsive-structure
  component_contracts:
    - component.kpi-card
    - component.chart-card
    - component.simple-data-table
    - component.filter-bar
    - component.status-badge
  validators:
    - validator.dashboard-region-presence
    - validator.kpi-count-bounds
    - validator.chart-semantics
    - validator.table-readability
    - validator.filter-mapping
    - validator.sample-data-relevance
    - validator.dashboard-responsive-a11y
    - validator.dashboard-anti-component-soup
  recovery_playbooks:
    - recovery.kpi-spam
    - recovery.fake-chart-data
    - recovery.dead-filters
    - recovery.dense-table
    - recovery.component-soup
    - recovery.admin-drift
  progress_labels: progress.dashboard-ui-core
  learning_hooks: learning.dashboard-ui-core

build_phases:
  - id: phase.understand
    title: Understand the dashboard request
    order: 1
    modules_used: [app_type]
  - id: phase.compose
    title: Compose dashboard regions and UI contracts
    order: 2
    modules_used: [mechanics, component_contracts]
  - id: phase.generate
    title: Generate custom dashboard code
    order: 3
    modules_used: [stack_kit_id, guidance]
  - id: phase.validate
    title: Check regions, KPI bounds, chart/table semantics
    order: 4
    modules_used: [validators]
  - id: phase.preview
    title: Prepare Workbench preview
    order: 5
    modules_used: []
  - id: phase.recover
    title: Fix known dashboard issues if needed
    order: 6
    optional: true
    modules_used: [recovery_playbooks]

acceptance_criteria:
  - "Page loads in preview without runtime console errors"
  - "Dashboard shell with header/main and a bounded KPI row renders"
  - "At least one chart with axis labels and one readable table render"
  - "Sample data is meaningful; no arbitrary filler arrays"
  - "Filters, if present, map to a visible data region"
  - "Empty/loading/error states are represented for async-looking regions"
  - "Semantic heading order with single h1; responsive at 360px width"

out_of_scope:
  - Backend APIs auth accounts databases or admin permissions
  - CRUD forms record mutation payments or billing management
  - Analytics workbench ad-hoc querying or pivot tables
  - CRM project management kanban or fintech trading order books
  - Real-time streaming maps or geospatial operations
  - Game HUD or marketing fake dashboard screenshot
  - Template cloning or pixel-perfect dashboard clones
