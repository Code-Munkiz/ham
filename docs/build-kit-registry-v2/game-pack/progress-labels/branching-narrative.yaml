# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: progress.branching-narrative
kind: progress_label
name: Branching narrative build progress
status: proposed
schema_version: "0.1"
version: "0.1.0-pilot"

description: >
  Normie-friendly phase labels for chat and Workbench activity stream during a branching
  narrative Game Pack build. Maps app_type build_phase ids to user-facing copy.

non_template_statement: >
  Progress copy module only. Not emitted by runtime today.

source_phase_owner: game.branching-narrative

applies_to:
  - game.branching-narrative

inputs:
  - current_phase_id: from game.branching-narrative build_phases
  - recovery_active: boolean

outputs:
  - activity_title: short string for feed
  - activity_message: one sentence for feed or chat ack

guidance:
  - "Avoid internal words: scaffold, template_kind, OpenRouter, kit_id"
  - "Use story-flavored plain language"
  - "Phase ids and order come from source_phase_owner build_phases only"

validation_notes:
  - Each mapped phase id exists on source_phase_owner build_phases
  - Each phase has a unique normie message

risk_notes:
  - Over-long messages clutter activity stream

phase_message_map:
  phase.understand:
    title: "Getting your story idea"
    message: "I'm turning your description into a branching story game plan."
  phase.compose:
    title: "Planning the story pieces"
    message: "I'm lining up scenes, choices, flags, and endings for your narrative game."
  phase.generate:
    title: "Building your story game"
    message: "I'm creating the custom code for your branching story preview."
  phase.validate:
    title: "Checking the story flow"
    message: "I'm making sure choices lead to valid scenes and reachable endings."
  phase.preview:
    title: "Opening preview"
    message: "Your story game preview is almost ready in the Workbench."
  phase.recover:
    title: "Polishing the story"
    message: "I noticed a small issue in the story flow and I'm fixing it before showing the preview."

technical_internal_notes:
  - "Map phase.generate to LLM scaffold step internally when wired"
  - "phase.compose corresponds to BuildRecipe assembly — not user-visible"
  - "phase.recover triggers recovery playbook runner — cap attempts per pack.game recovery_policy"
  - "Do not expose module ids (mechanic.story-node-graph) in normie messages"
