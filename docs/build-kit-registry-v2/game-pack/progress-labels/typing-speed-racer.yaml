# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: progress.typing-speed-racer
kind: progress_label
name: Typing speed racer build progress
status: proposed
schema_version: "0.1"
version: "0.1.0-pilot"

description: >
  Normie-friendly phase labels for chat and Workbench activity stream during a typing
  speed racer Game Pack build.

non_template_statement: >
  Progress copy module only. Not emitted by runtime today.

source_phase_owner: game.typing-speed-racer

applies_to:
  - game.typing-speed-racer

inputs:
  - current_phase_id: from game.typing-speed-racer build_phases
  - recovery_active: boolean

outputs:
  - activity_title: short string for feed
  - activity_message: one sentence for feed or chat ack

guidance:
  - "Avoid internal words: scaffold, template_kind, OpenRouter, kit_id"
  - "Use typing challenge plain language"
  - "Phase ids and order come from source_phase_owner build_phases only"

validation_notes:
  - Each mapped phase id exists on source_phase_owner build_phases
  - Each phase has a unique normie message

risk_notes:
  - Over-long messages clutter activity stream

phase_message_map:
  phase.understand:
    title: "Getting your typing challenge idea"
    message: "I'm turning your description into a typing speed game plan."
  phase.compose:
    title: "Planning the game pieces"
    message: "I'm lining up timer, WPM, accuracy, and input rules."
  phase.generate:
    title: "Building your typing game"
    message: "I'm creating the custom code for your typing challenge preview."
  phase.validate:
    title: "Checking the typing rules"
    message: "I'm verifying WPM, accuracy bounds, timer cleanup, and input lock."
  phase.preview:
    title: "Opening your typing preview"
    message: "Your typing challenge is almost ready to play in preview."
  phase.recover:
    title: "Fixing a typing issue"
    message: "I'm correcting a timer or scoring issue so the challenge runs cleanly."
