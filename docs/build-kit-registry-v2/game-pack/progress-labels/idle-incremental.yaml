# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: progress.idle-incremental
kind: progress_label
name: Idle incremental build progress
status: proposed
schema_version: "0.1"
version: "0.1.0-pilot"

description: >
  Normie-friendly phase labels for chat and Workbench activity stream during an
  idle/incremental Game Pack build. Maps app_type build_phase ids to user-facing
  copy — does not define phase structure independently.

non_template_statement: >
  Progress copy module only. Not emitted by runtime today.

source_phase_owner: game.idle-incremental

applies_to:
  - game.idle-incremental

inputs:
  - current_phase_id: from game.idle-incremental build_phases
  - recovery_active: boolean

outputs:
  - activity_title: short string for feed
  - activity_message: one sentence for feed or chat ack

guidance:
  - "Avoid internal words: scaffold, template_kind, OpenRouter, kit_id"
  - "Use game-flavored plain language"
  - "Phase ids and order come from source_phase_owner build_phases only"

validation_notes:
  - Each mapped phase id exists on source_phase_owner build_phases
  - Each phase has a unique normie message

risk_notes:
  - Over-long messages clutter activity stream

phase_message_map:
  phase.understand:
    title: "Getting your game idea"
    message: "I'm turning your description into a simple idle game plan."
  phase.compose:
    title: "Planning the game pieces"
    message: "I'm lining up coins, upgrades, and save-game behavior for your clicker."
  phase.generate:
    title: "Building your game"
    message: "I'm creating the custom code for your idle game preview."
  phase.validate:
    title: "Checking the game"
    message: "I'm making sure coins tick correctly and saves work in the browser."
  phase.preview:
    title: "Opening preview"
    message: "Your idle game preview is almost ready in the Workbench."
  phase.recover:
    title: "Polishing the game"
    message: "I noticed a small issue and I'm fixing it before showing the preview."

technical_internal_notes:
  - "Map phase.generate to LLM scaffold step internally when wired"
  - "phase.compose corresponds to BuildRecipe assembly — not user-visible"
  - "phase.recover triggers recovery playbook runner — cap attempts per pack.game recovery_policy"
  - "Do not expose module ids (mechanic.economy) in normie messages"
