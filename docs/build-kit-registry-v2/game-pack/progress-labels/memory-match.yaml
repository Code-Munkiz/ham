# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: progress.memory-match
kind: progress_label
name: Memory match build progress
status: proposed
schema_version: "0.1"
version: "0.1.0-pilot"

description: >
  Normie-friendly phase labels for chat and Workbench activity stream during a memory
  matching Game Pack build.

non_template_statement: >
  Progress copy module only. Not emitted by runtime today.

source_phase_owner: game.memory-match

applies_to:
  - game.memory-match

inputs:
  - current_phase_id: from game.memory-match build_phases
  - recovery_active: boolean

outputs:
  - activity_title: short string for feed
  - activity_message: one sentence for feed or chat ack

guidance:
  - "Avoid internal words: scaffold, template_kind, OpenRouter, kit_id"
  - "Use memory-game plain language"
  - "Phase ids and order come from source_phase_owner build_phases only"

validation_notes:
  - Each mapped phase id exists on source_phase_owner build_phases
  - Each phase has a unique normie message

risk_notes:
  - Over-long messages clutter activity stream

phase_message_map:
  phase.understand:
    title: "Getting your memory game idea"
    message: "I'm turning your description into a flip-and-match card game plan."
  phase.compose:
    title: "Planning the game pieces"
    message: "I'm lining up the card deck, flip rules, and win condition for your memory game."
  phase.generate:
    title: "Building your memory game"
    message: "I'm creating the custom code for your matching cards preview."
  phase.validate:
    title: "Checking the card game"
    message: "I'm making sure flips, pairs, and the victory screen work correctly."
  phase.preview:
    title: "Opening preview"
    message: "Your memory match game preview is almost ready in the Workbench."
  phase.recover:
    title: "Polishing the card game"
    message: "I noticed a small flip issue and I'm fixing it before showing the preview."

technical_internal_notes:
  - "Map phase.generate to LLM scaffold step internally when wired"
  - "phase.compose corresponds to BuildRecipe assembly — not user-visible"
  - "phase.recover triggers recovery playbook runner — cap attempts per pack.game recovery_policy"
  - "Do not expose module ids (mechanic.card-flip-state) in normie messages"
