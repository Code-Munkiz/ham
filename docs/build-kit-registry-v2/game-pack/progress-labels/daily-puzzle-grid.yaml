# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: progress.daily-puzzle-grid
kind: progress_label
name: Daily puzzle grid build progress
status: proposed
schema_version: '0.1'
version: 0.1.0-pilot
description: Normie-friendly phase labels for chat and Workbench activity stream during a daily grid logic puzzle Game Pack build.
non_template_statement: 'Progress copy module only. Not emitted by runtime today.

  '
source_phase_owner: game.daily-puzzle-grid
applies_to:
- game.daily-puzzle-grid
inputs:
- current_phase_id: from game.daily-puzzle-grid build_phases
- recovery_active: boolean
outputs:
- activity_title: short string for feed
- activity_message: one sentence for feed or chat ack
guidance:
- 'Avoid internal words: scaffold, template_kind, OpenRouter, kit_id'
- Use grid-puzzle plain language
- Phase ids and order come from source_phase_owner build_phases only
validation_notes:
- Each mapped phase id exists on source_phase_owner build_phases
- Each phase has a unique normie message
risk_notes:
- Over-long messages clutter activity stream
phase_message_map:
  phase.understand:
    title: Getting the idea
    message: Turning your description into a build plan.
  phase.compose:
    title: Planning pieces
    message: Lining up mechanics and UI contracts.
  phase.generate:
    title: Building the game
    message: Creating custom code for preview.
  phase.validate:
    title: Checking rules
    message: Verifying core loop and state behave correctly.
  phase.preview:
    title: Opening preview
    message: Preview is almost ready.
  phase.recover:
    title: Polishing
    message: Fixing a small issue before preview.
technical_internal_notes:
- Map phase.generate to LLM scaffold step internally when wired
- phase.compose corresponds to BuildRecipe assembly — not user-visible
- phase.recover triggers recovery playbook runner — cap attempts per pack.game recovery_policy
- Do not expose module ids (mechanic.constraint-rules) in normie messages
