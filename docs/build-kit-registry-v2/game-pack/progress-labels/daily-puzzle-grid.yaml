# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: progress.daily-puzzle-grid
kind: progress_label
name: Daily puzzle grid build progress
status: proposed
schema_version: "0.1"
version: "0.1.0-pilot"

description: >
  Normie-friendly phase labels for chat and Workbench activity stream during a daily
  grid logic puzzle Game Pack build.

non_template_statement: >
  Progress copy module only. Not emitted by runtime today.

source_phase_owner: game.daily-puzzle-grid

applies_to:
  - game.daily-puzzle-grid

inputs:
  - current_phase_id: from game.daily-puzzle-grid build_phases
  - recovery_active: boolean

outputs:
  - activity_title: short string for feed
  - activity_message: one sentence for feed or chat ack

guidance:
  - "Avoid internal words: scaffold, template_kind, OpenRouter, kit_id"
  - "Use grid-puzzle plain language"
  - "Phase ids and order come from source_phase_owner build_phases only"

validation_notes:
  - Each mapped phase id exists on source_phase_owner build_phases
  - Each phase has a unique normie message

risk_notes:
  - Over-long messages clutter activity stream

phase_message_map:
  phase.understand:
    title: "Getting your grid puzzle idea"
    message: "I'm turning your description into a daily grid logic puzzle plan."
  phase.compose:
    title: "Planning the game pieces"
    message: "I'm lining up the grid, rules, and cell interactions for your puzzle."
  phase.generate:
    title: "Building your grid puzzle"
    message: "I'm creating the custom code for your daily puzzle preview."
  phase.validate:
    title: "Checking the puzzle"
    message: "I'm making sure the grid, constraints, and completion behave correctly."
  phase.preview:
    title: "Opening preview"
    message: "Your grid puzzle preview is almost ready in the Workbench."
  phase.recover:
    title: "Polishing the puzzle"
    message: "I noticed a small grid issue and I'm fixing it before showing the preview."

technical_internal_notes:
  - "Map phase.generate to LLM scaffold step internally when wired"
  - "phase.compose corresponds to BuildRecipe assembly — not user-visible"
  - "phase.recover triggers recovery playbook runner — cap attempts per pack.game recovery_policy"
  - "Do not expose module ids (mechanic.constraint-rules) in normie messages"
