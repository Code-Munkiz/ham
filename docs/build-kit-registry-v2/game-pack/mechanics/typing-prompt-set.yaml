# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: mechanic.typing-prompt-set
kind: mechanic
name: Typing prompt set
status: proposed
schema_version: "0.1"
version: "0.1.0-pilot"

description: >
  Static in-memory list of typing prompts for one challenge session.

non_template_statement: >
  Behavioral recipe for prompt selection only. Not a checked-in corpus file.

applies_to:
  - game.typing-speed-racer
  - tag:typing-speed-racer

depends_on: []

provides:
  - prompt_queue_state

binds_components:
  - component.typing-prompt-panel

inputs:
  - prompts: array of strings — static list for MVP
  - prompt_category: string | null — optional theme filter

outputs:
  - currentPrompt: string
  - promptIndex: number
  - remainingPrompts: number

guidance:
  - "Embed prompt list in generated source for MVP"
  - "Advance to next prompt when current prompt completed or on timer tick policy"
  - "Do not fetch prompts from network"

validation_notes:
  - currentPrompt non-empty during active challenge

risk_notes:
  - Empty prompt list breaks challenge

state_model:
  fields:
    - name: currentPrompt
      type: string
    - name: promptIndex
      type: number
  events:
    - load_prompts
    - advance_prompt
    - reset_prompts

common_failure_modes:
  - "Empty prompts array"
  - "Index out of bounds on advance"

test_ideas:
  - "First prompt selected on start"
  - "Advance cycles through list"

reusable_across:
  - game.typing-speed-racer
