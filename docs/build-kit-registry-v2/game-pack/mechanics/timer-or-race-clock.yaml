# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: mechanic.timer-or-race-clock
kind: mechanic
name: Timer or race clock
status: proposed
schema_version: "0.1"
version: "0.1.0-pilot"

description: >
  Countdown or elapsed-time clock for the typing challenge. Starts on challenge
  begin, stops on finish, and cleans up intervals on unmount.

non_template_statement: >
  Timer behavior recipe only. Distinct from trivia per-question timer.

applies_to:
  - game.typing-speed-racer
  - tag:typing-speed-racer

depends_on:
  - mechanic.typing-prompt-set

provides:
  - race_clock_state

binds_components:
  - component.wpm-display

inputs:
  - challenge_seconds: number — default 60
  - mode: countdown | elapsed — default countdown

outputs:
  - remainingSeconds: number | null
  - elapsedSeconds: number
  - isRunning: boolean
  - isFinished: boolean

guidance:
  - "Use useEffect with cleanup for interval"
  - "Set isFinished when countdown reaches zero or user ends early"
  - "Stop clock before computing final WPM"

validation_notes:
  - validator.timer-completion
  - No timer callbacks after unmount

risk_notes:
  - Stale interval continues after finish
  - Double finish handler

state_model:
  fields:
    - name: elapsedSeconds
      type: number
    - name: isFinished
      type: boolean
  events:
    - start_clock
    - tick
    - stop_clock
    - finish

common_failure_modes:
  - "Interval survives challenge end"
  - "Clock never marks finished"

test_ideas:
  - "Countdown reaches zero and finishes"
  - "Elapsed time increases while running"

reusable_across:
  - game.typing-speed-racer
