# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: mechanic.resource-pool
kind: mechanic
name: Resource pool state
status: proposed
schema_version: "0.1"
version: "0.1.0-pilot"

description: >
  Maintains named resource quantities with explicit starting values and non-negative
  invariants. Foundation for allocation, production, and goal checks.

non_template_statement: >
  Resource pool guidance only. Not a preset economy spreadsheet.

applies_to:
  - game.resource-management-sim
  - tag:resource-management-sim

depends_on: []

provides:
  - resource_pool_state

binds_components:
  - component.resource-dashboard

inputs:
  - resources: array — id, name, quantity, displayUnit
  - starting_quantities: map resourceId to number

outputs:
  - pool: map resourceId to quantity

guidance:
  - "2–4 resources for MVP; names from user theme"
  - "Immutable updates when applying production or allocation"
  - "Never allow negative quantities after valid operations"
  - "Display quantities in resource dashboard"

validation_notes:
  - validator.no-negative-resources
  - Starting quantities within capacity when caps defined

risk_notes:
  - Mutable reference bugs double-spend resources

state_model:
  fields:
    - name: pool
      type: object
  events:
    - init_pool
    - apply_delta
    - reset_pool

common_failure_modes:
  - "Negative balance after spend"
  - "Resource id mismatch between pool and chains"

test_ideas:
  - "Init matches starting quantities"
  - "Delta apply never goes negative"

reusable_across:
  - game.resource-management-sim
