# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: pack.game
kind: registry_pack
name: Game Pack
status: proposed
schema_version: "0.1"

description: >
  Root manifest for the Build Kit Registry v2 Game Pack schema pilot. Indexes all
  proposed modules for DOM-native casual games, starting with game.idle-incremental,
  game.trivia-timer, game.branching-narrative, game.memory-match, game.word-daily,
  game.daily-puzzle-grid, and game.resource-management-sim (Wave 2 schema-only).
  Used for cross-reference validation and future composer defaults — not loaded by HAM
  at runtime today.

non_template_statement: >
  Registry index and compose defaults only. Does not ship starter game source,
  cloned Vite projects, or executable validators. HAM generates custom code from
  composed playbook context when wired — never from checked-in templates.

