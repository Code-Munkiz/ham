# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: pack.game
kind: registry_pack
name: Game Pack
status: proposed
schema_version: "0.1"

description: >
  Root manifest for the Build Kit Registry v2 Game Pack schema pilot. Indexes all
  proposed modules for DOM-native casual games, starting with game.idle-incremental,
  game.trivia-timer, game.branching-narrative, and game.memory-match.
  Used for cross-reference validation and future composer defaults — not loaded by HAM
  at runtime today.

non_template_statement: >
  Registry index and compose defaults only. Does not ship starter game source,
  cloned Vite projects, or executable validators. HAM generates custom code from
  composed playbook context when wired — never from checked-in templates.

module_index:
  app_types:
    - game.idle-incremental
    - game.trivia-timer
    - game.branching-narrative
    - game.memory-match
  stack_kits:
    - stack.dom-game-minimal
  mechanics:
    - mechanic.score
    - mechanic.economy
    - mechanic.upgrades
    - mechanic.save-load
    - mechanic.question-set
    - mechanic.timer
    - mechanic.answer-validation
    - mechanic.progression
    - mechanic.story-node-graph
    - mechanic.story-flags
    - mechanic.inventory-lite
    - mechanic.choice-resolution
    - mechanic.ending-resolution
    - mechanic.card-pair-set
    - mechanic.card-flip-state
    - mechanic.interaction-lock
    - mechanic.match-detection
    - mechanic.move-counter
    - mechanic.victory-detection
  component_contracts:
    - component.game-shell
    - component.resource-counter
    - component.upgrade-card
    - component.save-status
    - component.question-card
    - component.choice-list
    - component.timer-display
    - component.results-summary
    - component.story-panel
    - component.choice-card
    - component.story-state-summary
    - component.inventory-panel
    - component.ending-screen
    - component.card-grid
    - component.memory-card
    - component.move-counter
    - component.match-progress
    - component.victory-screen
  validators:
    - validator.no-negative-currency
    - validator.passive-income-tick
    - validator.local-storage-roundtrip
    - validator.timer-cleanup
    - validator.score-calculation
    - validator.question-progression
    - validator.story-graph-reachability
    - validator.no-dead-end-choice
    - validator.story-state-consistency
    - validator.card-pair-integrity
    - validator.flip-lock-prevents-third-card
    - validator.match-completion
  recovery_playbooks:
    - recovery.stale-interval-or-bad-tick-loop
    - recovery.invalid-local-storage-json
    - recovery.stale-timer-or-uncleared-timeout
    - recovery.broken-question-progression
    - recovery.broken-story-graph
    - recovery.inconsistent-story-state
    - recovery.broken-card-flip-state
    - recovery.mismatched-card-pairs
    - recovery.stuck-interaction-lock
  progress_labels:
    - progress.idle-incremental
    - progress.trivia-timer
    - progress.branching-narrative
    - progress.memory-match
  learning_hooks:
    - learning.idle-incremental
    - learning.trivia-timer
    - learning.branching-narrative
    - learning.memory-match

compose_defaults:
  compose_order:
    - intent
    - assumptions
    - stack
    - mechanics
    - components
    - phases
    - validators
    - recovery
    - progress
  max_modules: 24
  default_stack_kit_id: stack.dom-game-minimal
  validator_policy:
    run_after: [scaffold, economy_edit]
    severity_blocking_default: blocking
    runner_default: conceptual
    check_type_default: conceptual
  recovery_policy:
    max_attempts_default: 2
    re_validate_after_repair: true
    user_facing_on_exhausted: honest_failure

render_sections:
  - intent
  - assumptions
  - stack
  - mechanics
  - components
  - phases
  - validators
  - recovery
  - progress

non_runtime_notice: >
  This pack is documentation under docs/build-kit-registry-v2/. Registry v2
  composition, validation execution, and recovery runners are proposed in ADR-0016
  only. v1 builder kit JSON under src/ham/data/builder_kits/ is unchanged.
