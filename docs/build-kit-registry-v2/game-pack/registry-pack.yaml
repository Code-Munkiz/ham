compose_defaults:
  compose_order:
    - intent
    - assumptions
    - stack
    - mechanics
    - components
    - phases
    - validators
    - recovery
    - progress
  max_modules: 26
  default_stack_kit_id: stack.dom-game-minimal
  validator_policy:
    run_after: [scaffold, economy_edit]
    severity_blocking_default: blocking
    runner_default: conceptual
    check_type_default: conceptual
  recovery_policy:
    max_attempts_default: 2
    re_validate_after_repair: true
    user_facing_on_exhausted: honest_failure

render_sections:
  - intent
  - assumptions
  - stack
  - mechanics
  - components
  - phases
  - validators
  - recovery
  - progress

non_runtime_notice: >
  This pack is documentation under docs/build-kit-registry-v2/. Registry v2
  composition, validation execution, and recovery runners are proposed in ADR-0016
  only. v1 builder kit JSON under src/ham/data/builder_kits/ is unchanged.
