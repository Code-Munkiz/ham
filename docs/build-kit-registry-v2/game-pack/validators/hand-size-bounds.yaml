# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: validator.hand-size-bounds
kind: validator
name: Hand size bounds
status: proposed
schema_version: "0.1"
version: "0.1.0-pilot"

description: >
  Ensures hand length never exceeds hand limit and never goes negative after
  draw, play, or discard operations.

non_template_statement: >
  Validation rule definition only. Not executable until a future validator runner exists.

applies_to:
  - game.card-deck-turn-based
  - tag:card-deck-turn-based

depends_on:
  - mechanic.hand-state

validates_modules:
  - mechanic.hand-state
  - component.hand-panel

severity: blocking
runner: conceptual
check_type: conceptual

inputs:
  - hand: array
  - handLimit: number

outputs:
  - pass | fail with reason code

guidance:
  - "hand.length <= handLimit after draw unless overflow explicitly allowed"
  - "hand.length >= 0 always"
  - "Remove from hand on every successful play"

validation_notes:
  - Run after hand mutation handlers
  - Does not execute at runtime today

risk_notes:
  - Draw effect bypasses limit

validation_goal: >
  Hand limit is a core constraint in turn-based card MVP loops.

pass_conditions:
  - "hand.length <= handLimit under default rules"
  - "Play removes exactly one card from hand"

fail_conditions:
  - "Hand exceeds limit without user override"
  - "Negative hand length"
  - "Play succeeds but card remains in hand"

suggested_failure_message: >
  Your hand size went out of bounds. I'll fix draw and play so the hand limit is
  respected.

recovery_playbooks:
  - recovery.invalid-hand-state
