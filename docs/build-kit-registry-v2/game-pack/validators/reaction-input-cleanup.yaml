id: validator.reaction-input-cleanup
kind: validator
name: Reaction input cleanup
status: proposed
schema_version: "0.1"
version: "0.1.0-pilot"

description: >
  Ensures signal delay timeouts and listeners are cleared on unmount, false start,
  and play again.

non_template_statement: >
  Validation rule definition only. Not executable until a future validator runner exists.

applies_to:
  - game.reaction-time-challenge
  - tag:reaction-time-challenge

