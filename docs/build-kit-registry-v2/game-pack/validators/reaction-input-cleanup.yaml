validates_modules:
  - mechanic.random-signal-delay
  - mechanic.reaction-input-response

severity: blocking
runner: conceptual
check_type: conceptual

inputs:
  - scheduledTimeouts: conceptual
  - effectCleanups: conceptual

outputs:
  - pass | fail with reason code

guidance:
  - "useEffect cleanup clears setTimeout"
  - "No signal after component unmount"

validation_notes:
  - Run after delay and effect handler edits

risk_notes:
  - Stale timeout shows signal on wrong screen

validation_goal: >
  Protect timeout and listener cleanup.

pass_conditions:
