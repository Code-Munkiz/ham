# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: validator.card-effect-resolution-order
kind: validator
name: Card effect resolution order
status: proposed
schema_version: "0.1"
version: "0.1.0-pilot"

description: >
  Ensures card effects resolve deterministically in defined order: leave hand,
  apply effect to target, update piles and HP, then log — without double application.

non_template_statement: >
  Validation rule definition only. Not executable until a future validator runner exists.

applies_to:
  - game.card-deck-turn-based
  - tag:card-deck-turn-based

depends_on:
  - mechanic.card-effect-resolution
  - mechanic.opponent-challenge-state

validates_modules:
  - mechanic.card-effect-resolution
  - mechanic.opponent-challenge-state
  - component.card-battle-event-log

severity: blocking
runner: conceptual
check_type: conceptual

inputs:
  - card: effect metadata
  - state_before: HP and piles
  - state_after: HP and piles

outputs:
  - pass | fail with reason code

guidance:
  - "Damage applies once per play to intended target"
  - "Heal does not exceed max HP if cap defined"
  - "Draw effect respects hand limit unless overflow allowed"
  - "Event log receives one entry per resolved effect"

validation_notes:
  - Run after play handler and effect pipeline edits
  - Does not execute at runtime today

risk_notes:
  - Effect fires before card leaves hand causing double trigger

validation_goal: >
  Deterministic effect order prevents duplicate damage and pile corruption.

pass_conditions:
  - "Single play applies effect value once"
  - "HP updates match effect type and value"

fail_conditions:
  - "Damage applied twice on one play"
  - "Effect target wrong side"
  - "Draw effect skips deck pile"

suggested_failure_message: >
  Card effects aren't resolving in the right order. I'll fix the play pipeline so
  damage, heal, and draw happen once and correctly.

recovery_playbooks:
  - recovery.stuck-turn-loop
  - recovery.invalid-hand-state
