# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: validator.draw-discard-consistency
kind: validator
name: Draw discard consistency
status: proposed
schema_version: "0.1"
version: "0.1.0-pilot"

description: >
  Verifies draw moves card from draw pile to hand and play/discard moves card from
  hand to discard without dropping or duplicating cards.

non_template_statement: >
  Validation rule definition only. Not executable until a future validator runner exists.

applies_to:
  - game.card-deck-turn-based
  - tag:card-deck-turn-based

depends_on:
  - mechanic.deck-draw-pile
  - mechanic.hand-state
  - mechanic.discard-pile

validates_modules:
  - mechanic.deck-draw-pile
  - mechanic.hand-state
  - mechanic.discard-pile
  - mechanic.card-effect-resolution

severity: blocking
runner: conceptual
check_type: conceptual

inputs:
  - action_sequence: draw | play | discard
  - zone_snapshots: before and after

outputs:
  - pass | fail with reason code

guidance:
  - "Draw: drawPile -1, hand +1, same card id"
  - "Play: hand -1, discard +1, same card id"
  - "Draw effect from card follows same conservation rules"

validation_notes:
  - Run after draw/play handler edits
  - Does not execute at runtime today

risk_notes:
  - Effect draw skips pile removal

validation_goal: >
  Card conservation across draw, hand, and discard is mandatory for pile games.

pass_conditions:
  - "Draw transfers one id from drawPile to hand"
  - "Play transfers one id from hand to discardPile"

fail_conditions:
  - "Draw increases hand without removing from drawPile"
  - "Play removes hand card but discard unchanged"
  - "Card appears in two zones after single action"

suggested_failure_message: >
  Cards aren't moving correctly between the deck, hand, and discard pile. I'll fix
  the draw and play flow.

recovery_playbooks:
  - recovery.broken-deck-state
  - recovery.invalid-hand-state
