# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: learning.card-deck-turn-based
kind: learning_hook
name: Card deck turn-based learning hooks
status: proposed
schema_version: "0.1"
version: "0.1.0-pilot"

description: >
  Future Hermes evolution signals for turn-based card battle builds — outcome facts
  and critique prompts. Not wired at runtime.

non_template_statement: >
  Learning hook schema only. Hermes integration deferred per ADR-0018.

applies_to:
  - game.card-deck-turn-based
  - tag:card-deck-turn-based

source_phase_owner: game.card-deck-turn-based

signal_categories:
  - deck_zone_integrity
  - hand_size_bounds
  - draw_discard_consistency
  - turn_loop_alternation
  - card_effect_resolution_order
  - win_loss_detection
  - preview_boot_success

outcome_fact_fields:
  - preview_boot_success: boolean
  - pile_conservation_violation: boolean
  - hand_limit_violation: boolean
  - turn_stuck_on_one_side: boolean
  - win_loss_fires_correctly: boolean
  - validator_failures: array of validator id

guidance:
  - "Capture bounded text evidence from preview console and validator results"
  - "Do not persist user prompts containing secrets"
  - "Align with OUTCOME_FACTS.md when Hermes loop lands"

validation_notes:
  - Categories map to composed validators and acceptance_criteria

risk_notes:
  - Premature wiring could leak PII from user prompts
