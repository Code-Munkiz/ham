# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: learning.word-builder
kind: learning_hook
name: Word builder learning hooks
status: proposed
schema_version: "0.1"
version: "0.1.0-pilot"

description: >
  Future Hermes evolution signals for word builder builds — outcome facts and critique
  prompts. Not wired at runtime.

non_template_statement: >
  Learning hook schema only. Hermes integration deferred per ADR-0018.

applies_to:
  - game.word-builder

source_phase_owner: game.word-builder

signal_categories:
  - letter_pool_integrity
  - word_validation_correctness
  - duplicate_submission_blocking
  - scoring_consistency
  - completion_detection
  - preview_boot_success

outcome_fact_fields:
  - preview_boot_success: boolean
  - duplicate_submission_scored_twice: boolean
  - invalid_word_accepted: boolean
  - completion_fires_correctly: boolean
  - validator_failures: array of validator id

guidance:
  - "Capture bounded text evidence from preview console and validator results"
  - "Do not persist user prompts containing secrets"
  - "Align with OUTCOME_FACTS.md when Hermes loop lands"

validation_notes:
  - Categories map to composed validators and acceptance_criteria

risk_notes:
  - Premature wiring could leak PII from user prompts
