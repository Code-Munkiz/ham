# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: learning.resource-management-sim
kind: learning_hook
name: Resource management sim learning hooks
status: proposed
schema_version: "0.1"
version: "0.1.0-pilot"

description: >
  Future Hermes evolution signals for resource management sim builds — outcome
  facts and critique prompts. Not wired at runtime.

non_template_statement: >
  Learning hook schema only. Hermes integration deferred per ADR-0018.

applies_to:
  - game.resource-management-sim

source_phase_owner: game.resource-management-sim

signal_categories:
  - resource_balance_stability
  - production_chain_clarity
  - allocation_ux
  - goal_reachability
  - tick_loop_reliability

outcome_fact_fields:
  - preview_boot_success: boolean
  - negative_resource_detected: boolean
  - win_condition_reachable_in_smoke: boolean
  - tick_loop_clean_unmount: boolean
  - validator_failures: array of validator id

guidance:
  - "Capture bounded text evidence from preview console and validator results"
  - "Do not persist user prompts containing secrets"
  - "Align with OUTCOME_FACTS.md when Hermes loop lands"

validation_notes:
  - Categories map to composed validators and acceptance_criteria

risk_notes:
  - Premature wiring could leak PII from user prompts
