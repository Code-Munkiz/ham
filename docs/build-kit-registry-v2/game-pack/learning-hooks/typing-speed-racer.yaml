# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: learning.typing-speed-racer
kind: learning_hook
name: Typing speed racer learning hooks
status: proposed
schema_version: "0.1"
version: "0.1.0-pilot"

description: >
  Future Hermes evolution signals for typing speed racer builds — outcome facts and
  critique prompts. Not wired at runtime.

non_template_statement: >
  Learning hook schema only. Hermes integration deferred per ADR-0018.

applies_to:
  - game.typing-speed-racer

source_phase_owner: game.typing-speed-racer

signal_categories:
  - wpm_calculation_consistency
  - accuracy_score_bounds
  - timer_completion
  - input_lock_after_finish
  - preview_boot_success

outcome_fact_fields:
  - preview_boot_success: boolean
  - input_accepted_after_finish: boolean
  - wpm_matches_formula: boolean
  - accuracy_in_bounds: boolean
  - validator_failures: array of validator id

guidance:
  - "Capture bounded text evidence from preview console and validator results"
  - "Do not persist user prompts containing secrets"
  - "Align with OUTCOME_FACTS.md when Hermes loop lands"

validation_notes:
  - Categories map to composed validators and acceptance_criteria

risk_notes:
  - Premature wiring could leak PII from user prompts
