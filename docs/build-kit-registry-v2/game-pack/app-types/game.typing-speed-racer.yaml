# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: game.typing-speed-racer
kind: app_type
name: Typing speed racer
status: proposed
schema_version: "0.1"
version: "0.1.0-pilot"

description: >
  A browser-based typing challenge game where the player types prompts under time
  pressure, tracks words-per-minute, accuracy, mistakes, streaks, and reaches a
  result state. Uses static in-memory prompt list for MVP. Output is always
  custom-generated from the user prompt plus composed playbook modules — never
  cloned from a starter project.

non_template_statement: >
  This app type does not reference checked-in prompt corpora, live typing APIs,
  or clone baselines. It defines generative guidance only.

legacy_v1_fallback: generic

safety_constraints:
  - no-network-egress-for-mvp
  - no-eval
  - no-user-accounts-for-mvp
  - no-multiplayer-for-mvp
  - static-prompt-list-for-mvp
  - no-live-prompt-api-for-mvp
  - no-real-money-economy
  - dom-native-ui-only-for-mvp

applies_to:
  - tag:typing-speed-racer
  - tag:dom-casual-game

inputs:
  - user_prompt: natural language theme for typing UI copy
  - optional_challenge_seconds: number — default 60
  - optional_prompt_category: string — theme hint for prompt list

outputs:
  - runnable_vite_react_app: single-page DOM typing challenge game
  - composed_build_recipe: ids of mechanics, contracts, validators, recovery modules
  - normie_plan_summary: phased build description for chat/activity stream

guidance:
  - "React state; static prompt list embedded in generated source"
  - "Track elapsed or countdown timer deterministically"
  - "Calculate WPM from typed characters/words and elapsed time"
  - "Track accuracy as bounded percentage from correct vs attempted"
  - "Track mistakes deterministically; optional streak/combo"
  - "Lock input after challenge ends; show results summary"
  - "DOM/React only; no live prompt API for MVP"

validation_notes:
  - Run composed validators after scaffold and input handler edits
  - Preview must boot without console errors before success copy

risk_notes:
  - WPM formula inconsistent with elapsed time
  - Input accepted after timer ends
  - Accuracy exceeds 100% or goes negative

user_prompt_examples:
  - "Build a typing speed game"
  - "Make a typing test with WPM and accuracy"
  - "Create a 60-second typing challenge"
  - "Build a typing racer where I type prompts under time pressure"

intent_signals:
  - "\\btyping\\s+(speed|test|game|challenge|racer)\\b"
  - "\\b(words?\\s+per\\s+minute|wpm)\\b.{0,80}\\b(typing|accuracy)\\b"
  - "\\btyping\\s+challenge\\b.{0,80}\\b(timer|accuracy|wpm)\\b"

clarifying_questions:
  - when: intent_confidence_low
    ask: "Challenge duration — default 60 seconds?"
  - when: input_ambiguous
    ask: "Countdown race or elapsed-time mode?"
  - when: theme_ambiguous
    ask: "Any prompt category — quotes, tech terms, general?"

default_assumptions:
  - "Static embedded prompt list; one active prompt at a time"
  - "60-second challenge or short race mode"
  - "WPM + accuracy + mistake summary on finish"
  - "Local-only session state"
  - "DOM/React UI; mobile-friendly at 360px width"

hard_constraints:
  - no-real-money-economy
  - no-template-cloning
  - no-runtime-llm-generation-for-mvp
  - no-external-api-for-mvp
  - no-user-secrets-or-credentials
  - preserve-safe-local-mvp-scope
  - static-prompt-list-for-mvp
  - dom-native-ui-only-for-mvp
  - input-lock-after-finish-for-mvp

soft_defaults:
  - static prompt list
  - 60-second challenge
  - local-only state
  - WPM plus accuracy plus mistake summary
  - no leaderboard

user_overridable:
  - theme and copy tone
  - prompt category
  - challenge duration
  - prompt length preference
  - scoring formula labels
  - streak display
  - result copy tone

clarify_if_changed:
  - requiring multiplayer race
  - adding backend leaderboard
  - using live prompt API
  - accepting input after timer ends
  - replacing typing challenge with flashcards or word guessing

out_of_scope_unless_explicit:
  - user accounts or cloud sync
  - backend persistence
  - global leaderboards
  - multiplayer typing race
  - live prompt API
  - AI-generated prompts at runtime
  - social sharing integrations
  - anti-cheat system

conflict_policy:
  user_explicit_overrides_soft_defaults: true
  safety_constraints_override_user_request: true
  core_loop_conflicts_require_clarification: true
  out_of_scope_items_require_explicit_request: true
  fallback_to_v1_or_generic_when_recipe_no_longer_fits: true

stack_kit_id: stack.dom-game-minimal

compose_order_ref: pack.game#compose_defaults.compose_order

composed_modules:
  stack_kit_id: stack.dom-game-minimal
  mechanics:
    - mechanic.typing-prompt-set
    - mechanic.timer-or-race-clock
    - mechanic.typing-input-stream
    - mechanic.mistake-tracking-typing
    - mechanic.accuracy-scoring
    - mechanic.wpm-calculation
    - mechanic.streak-combo
    - mechanic.typing-result-state
  component_contracts:
    - component.game-shell
    - component.typing-prompt-panel
    - component.typing-input-box
    - component.wpm-display
    - component.accuracy-meter
    - component.streak-indicator
    - component.typing-results-panel
  validators:
    - validator.wpm-calculation-consistency
    - validator.accuracy-score-bounds
    - validator.timer-completion
    - validator.mistake-counting
    - validator.input-lock-after-finish
  recovery_playbooks:
    - recovery.broken-wpm-calculation
    - recovery.invalid-accuracy-score
    - recovery.stuck-typing-timer
    - recovery.input-accepted-after-finish
  progress_labels: progress.typing-speed-racer
  learning_hooks: learning.typing-speed-racer

build_phases:
  - id: phase.understand
    title: Understand the typing challenge idea
    order: 1
    modules_used: [app_type]
  - id: phase.compose
    title: Compose mechanics and UI contracts
    order: 2
    modules_used: [mechanics, component_contracts]
  - id: phase.generate
    title: Generate custom typing game code
    order: 3
    modules_used: [stack_kit_id, guidance]
  - id: phase.validate
    title: Check WPM, accuracy, and timer rules
    order: 4
    modules_used: [validators]
  - id: phase.preview
    title: Prepare Workbench preview
    order: 5
    modules_used: []
  - id: phase.recover
    title: Fix known failure modes if needed
    order: 6
    optional: true
    modules_used: [recovery_playbooks]

acceptance_criteria:
  - "Game loads in preview without runtime console errors"
  - "Player can type prompts while challenge is active"
  - "WPM updates from typed content and elapsed time"
  - "Accuracy stays within 0–100%"
  - "Mistakes increment deterministically on wrong characters"
  - "Input disabled after challenge ends"
  - "Results panel shows WPM, accuracy, mistakes, optional streak"
  - "UI readable on mobile-width viewport"

out_of_scope:
  - Multiplayer typing race or live head-to-head
  - Global leaderboards or user accounts
  - Live prompt API or AI-generated prompts at runtime
  - Anti-cheat or server-side verification
  - Monetized prizes or Web3/token rewards
  - Canvas, Phaser, or physics engines
