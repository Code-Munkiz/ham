# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: game.turn-based-tactics-lite
kind: app_type
name: Turn-based tactics lite
status: proposed
schema_version: "0.1"
version: "0.1.0-pilot"

description: >
  DOM turn-based tactics skirmish: fixed grid, player/enemy units, select/move/attack,
  alternating turns, win/loss, restart. Custom-generated from prompt — never cloned.

non_template_statement: >
  Generative guidance only — no checked-in battle maps, chess engines, or templates.

legacy_v1_fallback: generic

safety_constraints:
  - no-network-egress-for-mvp
  - no-eval
  - no-user-accounts-for-mvp
  - no-multiplayer-for-mvp
  - no-real-money-economy
  - dom-native-ui-only-for-mvp
  - no-canvas-or-physics-for-mvp
  - no-chess-checkers-go-for-mvp
  - no-city-builder-or-resource-sim-for-mvp
  - no-tower-defense-or-rts-for-mvp
  - no-map-editor-for-mvp
  - no-rpg-campaign-for-mvp

applies_to:
  - tag:turn-based-tactics-lite
  - tag:dom-casual-game

inputs:
  - user_prompt: natural language tactics battle theme
  - optional_grid_size: number — default 5 or 6
  - optional_player_units: number — default 1–3
  - optional_enemy_units: number — default 1–3
  - optional_movement_range: number — default 2–3 Manhattan
  - optional_attack_range: number — default 1 adjacent

outputs:
  - runnable_vite_react_app: single-page DOM tactics battle
  - composed_build_recipe: ids of mechanics, contracts, validators, recovery modules
  - normie_plan_summary: phased build description for chat/activity stream

guidance:
  - "Phases: player turn → move/attack/end turn → enemy turn → repeat until win/loss"
  - "Fixed grid; seeded units; highlight movement/attack ranges; simple enemy script"
  - "DOM click/tap only; no Canvas or pathfinding library"

validation_notes:
  - Run composed validators after scaffold and move/attack/turn handler edits
  - Preview must boot without console errors before success copy

risk_notes:
  - Shell grid UI without move/attack handlers or stuck turn phase
  - Board array and unit roster positions diverge
  - Drift into chess, puzzle grid, city sim, tower defense, or RTS scope
  - Weak tactics/grid terms alone are insufficient for future routing

user_prompt_examples:
  - "Build a browser turn-based tactics game on a small grid where the player moves units, attacks enemies, and wins by defeating all enemies."
  - "Build a local tactics battle with a 5x5 grid, two player units, two enemies, move range, attack range, enemy turn, and restart."
  - "Build a simple grid tactics game where selecting a unit shows movement options and attacking reduces enemy HP."
  - "Build a DOM tactics battle where player and enemy units take turns moving and attacking until one side wins."

negative_prompt_examples:
  - "Build a chess game."
  - "Build a checkers game."
  - "Build a Sudoku puzzle grid."
  - "Build a daily puzzle grid."
  - "Build a city builder."
  - "Build a resource management sim."
  - "Build a tower defense game."
  - "Build a real-time strategy game."
  - "Build an RPG campaign battle system."
  - "Build a map editor."
  - "Build a physics combat game."
  - "Build a multiplayer tactics game."
  - "Build a card battle game."
  - "Build a deck-building card game."
  - "Build a dashboard grid."

intent_signals:
  - "\\bturn[- ]based\\b.{0,80}\\btactics\\b.{0,80}\\b(grid|units|battle)\\b"
  - "\\b(grid|tile)\\b.{0,80}\\b(units|enemies)\\b.{0,80}\\b(move|attack|turn)\\b"
  - "\\bselect\\s+a\\s+unit\\b.{0,80}\\b(move|attack)\\b"
  - "\\bdefeat\\s+all\\s+enemies\\b.{0,80}\\b(grid|tactics|battle)\\b"

clarifying_questions:
  - when: intent_confidence_low
    ask: "Grid size — default 5x5 or 6x6?"
  - when: unit_count_ambiguous
    ask: "How many player and enemy units — default two each?"
  - when: range_ambiguous
    ask: "Movement range and attack range — default move 2, attack adjacent?"

default_assumptions:
  - "5x5 or 6x6 grid; 1–3 units per side; Manhattan move range 2; attack range 1"
  - "Player turn first; simple enemy move-toward-player then attack if in range"
  - "Local-only DOM/React at 360px width"

hard_constraints:
  - no-real-money-economy
  - no-template-cloning
  - no-runtime-llm-generation-for-mvp
  - no-external-api-for-mvp
  - no-user-secrets-or-credentials
  - preserve-safe-local-mvp-scope
  - dom-native-ui-only-for-mvp
  - no-canvas-or-physics-for-mvp
  - no-chess-checkers-go-for-mvp
  - no-city-builder-or-resource-sim-for-mvp
  - no-tower-defense-or-rts-for-mvp
  - no-map-editor-for-mvp
  - no-rpg-campaign-for-mvp

soft_defaults:
  - static embedded unit definitions
  - fixed grid without scrolling map
  - Manhattan movement with range highlighting only
  - adjacent or radius-1 attack
  - scripted enemy response without pathfinding library
  - defeat-all-enemies victory

user_overridable:
  - theme and visual tone
  - unit names and HP values
  - grid size within small bounds
  - movement and attack range numbers
  - result copy tone

clarify_if_changed:
  - replacing tactics grid with chess or checkers rules
  - adding city-builder, resource sim, or production chains
  - adding tower defense waves or real-time continuous combat
  - adding campaign map, fog of war, or inventory/equipment
  - adding map or level editor
  - adding multiplayer or accounts
  - requiring Canvas, physics, or external pathfinding library

out_of_scope_unless_explicit:
  - user accounts or cloud sync
  - backend persistence or leaderboards
  - multiplayer or online PvP
  - chess, checkers, Go, Sudoku, daily logic puzzles
  - city builder, resource management sim, tower defense, RTS
  - RPG campaign, map editor, physics combat

conflict_policy:
  user_explicit_overrides_soft_defaults: true
  safety_constraints_override_user_request: true
  core_loop_conflicts_require_clarification: true
  out_of_scope_items_require_explicit_request: true
  fallback_to_v1_or_generic_when_recipe_no_longer_fits: true

adaptive_policy_note: >
  User prompt is source of truth. Build Kit is expert playbook. Hard constraints are
  non-negotiable; soft defaults may be overridden. Excluded semantics (chess, puzzle
  grid, city sim, tower defense, RTS, map editor, physics) should clarify or fall back.
  Weak terms like tactics, strategy, grid, units, battle, turns, move, or attack alone
  are not enough for future routing.

stack_kit_id: stack.dom-game-minimal

compose_order_ref: pack.game#compose_defaults.compose_order

composed_modules:
  stack_kit_id: stack.dom-game-minimal
  mechanics:
    - mechanic.tactics-grid-board-state
    - mechanic.tactics-unit-roster
    - mechanic.tactics-selection-state
    - mechanic.tactics-movement-range
    - mechanic.tactics-attack-resolution
    - mechanic.tactics-turn-loop
    - mechanic.tactics-enemy-response
    - mechanic.tactics-battle-result-state
  component_contracts:
    - component.game-shell
    - component.tactics-grid-board
    - component.unit-status-panel
    - component.tactics-action-bar
    - component.tactics-event-log
    - component.tactics-results-panel
  validators:
    - validator.tactics-seeded-units-on-grid
    - validator.tactics-valid-movement-range
    - validator.tactics-attack-resolution
    - validator.tactics-enemy-response-mutates-state
    - validator.tactics-battle-result-detection
  recovery_playbooks:
    - recovery.tactics-empty-grid-no-units
    - recovery.tactics-no-selected-unit
    - recovery.tactics-stuck-turn-phase
    - recovery.tactics-invalid-movement-accepted
    - recovery.tactics-missing-battle-result
  progress_labels: progress.turn-based-tactics-lite
  learning_hooks: learning.turn-based-tactics-lite

build_phases:
  - id: phase.understand
    title: Understand idea
    order: 1
    modules_used: [app_type]
  - id: phase.compose
    title: Compose modules
    order: 2
    modules_used: [mechanics, component_contracts]
  - id: phase.generate
    title: Generate code
    order: 3
    modules_used: [stack_kit_id, guidance]
  - id: phase.validate
    title: Validate rules
    order: 4
    modules_used: [validators]
  - id: phase.preview
    title: Preview
    order: 5
    modules_used: []
  - id: phase.recover
    title: Recover
    order: 6
    optional: true
    modules_used: [recovery_playbooks]

acceptance_criteria:
  - "Game loads in preview without runtime console errors"
  - "Grid renders with seeded player and enemy units"
  - "Player can select a unit, move within range, attack, and end turn"
  - "Enemy turn mutates state with move or attack or explicit skip"
  - "Win when all enemies defeated; loss when all player units defeated"
  - "Restart resets grid, units, turn phase, and result"
  - "UI readable on mobile-width viewport"

out_of_scope:
  - Multiplayer, accounts, leaderboards, backend
  - Chess, checkers, Go, Sudoku, daily puzzle grids
  - City builder, resource sim, tower defense, RTS, RPG campaign
  - Map editor, Canvas/physics, pathfinding libraries
