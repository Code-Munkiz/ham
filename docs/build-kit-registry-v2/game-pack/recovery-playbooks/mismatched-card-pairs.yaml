# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: recovery.mismatched-card-pairs
kind: recovery_playbook
name: Fix mismatched card pairs in deck
status: proposed
schema_version: "0.1"
version: "0.1.0-pilot"

description: >
  Repairs invalid deck definitions: wrong pair counts, odd deck sizes, or grid/deck
  dimension mismatch.

non_template_statement: >
  Executable recovery strategy spec for a future runner. Not auto-applied today.

max_attempts: 2

applies_to:
  - game.memory-match
  - tag:memory-match

depends_on:
  - mechanic.card-pair-set
  - validator.card-pair-integrity

repairs_validators:
  - validator.card-pair-integrity

inputs:
  - failure_context: validator result
  - current_source: deck init (conceptual)

outputs:
  - patched_source: conceptual
  - revalidation_target: validator.card-pair-integrity

guidance:
  - "Ensure each pairId duplicated exactly once in deck builder"
  - "Trim or pad deck to rows*cols with even count"
  - "Re-shuffle after structural fix"

validation_notes:
  - Re-run card-pair-integrity after repair
  - Max 2 attempts

risk_notes:
  - May reduce pair count to fit grid

failure_signals:
  - validator.card-pair-integrity fail
  - Match never possible due to triple symbols
  - Empty grid cells

diagnosis_steps:
  - "Histogram pairId counts"
  - "Compare cards.length to rows*cols"
  - "Verify shuffle preserves pair structure"

steps:
  - id: step.fix_pair_counts
    action: fix_pair_counts
    detail: "Each symbol exactly two cards"
  - id: step.align_grid
    action: align_grid
    detail: "Deck size matches grid dimensions"
  - id: step.re_shuffle
    action: re_shuffle
    detail: "Shuffle valid deck on init"
  - id: step.re_validate
    action: re_validate
    detail: "Re-run validator.card-pair-integrity"

repair_strategy:
  - action: fix_pair_counts
    detail: "Correct pair duplication"
  - action: align_grid
    detail: "Grid/deck alignment"
  - action: re_shuffle
    detail: "Fresh shuffle"
  - action: re_validate
    target: validator.card-pair-integrity

guardrails:
  - max_attempts: 2
  - preserve: "User-requested theme symbols where possible"

user_facing_summary: >
  I fixed the card deck so every symbol appears in exactly one matching pair.
