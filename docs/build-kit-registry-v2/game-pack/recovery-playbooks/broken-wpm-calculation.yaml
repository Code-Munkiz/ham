# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: recovery.broken-wpm-calculation
kind: recovery_playbook
name: Fix broken WPM calculation
status: proposed
schema_version: "0.1"
version: "0.1.0-pilot"

description: >
  Repairs WPM formula inconsistencies with elapsed time or typed character counts.

non_template_statement: >
  Executable recovery strategy spec for a future runner. Not auto-applied today.

max_attempts: 2

applies_to:
  - game.typing-speed-racer
  - tag:typing-speed-racer

depends_on:
  - mechanic.wpm-calculation
  - validator.wpm-calculation-consistency

repairs_validators:
  - validator.wpm-calculation-consistency

inputs:
  - failure_context: validator result
  - current_source: WPM handler (conceptual)

outputs:
  - patched_source: conceptual
  - revalidation_target: validator.wpm-calculation-consistency

guidance:
  - "Use max(elapsedSeconds, 1) as denominator guard"
  - "Freeze WPM on finish event"

validation_notes:
  - Re-run wpm-calculation-consistency after repair

risk_notes:
  - Patch breaks accuracy display sync

failure_signals:
  - validator.wpm-calculation-consistency fail

diagnosis_steps:
  - "Inspect WPM formula vs typedCharacters and elapsedSeconds"
  - "Check for post-finish recalculation"

steps:
  - id: step.denom_guard
    action: denom_guard
    detail: "Guard elapsed denominator to avoid Infinity WPM"
  - id: step.freeze_on_finish
    action: freeze_on_finish
    detail: "Stop WPM updates when challenge finishes"
  - id: step.re_validate
    action: re_validate
    detail: "Re-run validator.wpm-calculation-consistency"

repair_strategy:
  - action: denom_guard
    detail: "Minimum elapsed seconds guard"
  - action: freeze_on_finish
    detail: "Lock final WPM"
  - action: re_validate
    target: validator.wpm-calculation-consistency

guardrails:
  - max_attempts: 2
  - preserve: "Challenge duration and prompt list"

user_facing_summary: >
  I fixed the WPM calculation so it matches your typing speed and elapsed time.
