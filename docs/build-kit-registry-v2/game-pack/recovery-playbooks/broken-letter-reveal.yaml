# CONCEPTUAL SCHEMA PILOT — not loaded at runtime
id: recovery.broken-letter-reveal
kind: recovery_playbook
name: Fix broken letter reveal
status: proposed
schema_version: "0.1"
version: "0.1.0-pilot"

description: >
  Repairs reveal logic that misses duplicate letter positions or reveals wrong slots.

non_template_statement: >
  Executable recovery strategy spec for a future runner. Not auto-applied today.

max_attempts: 2

applies_to:
  - game.hangman-lite
  - tag:hangman-lite

depends_on:
  - mechanic.reveal-state
  - validator.letter-reveal-correctness

repairs_validators:
  - validator.letter-reveal-correctness

inputs:
  - failure_context: validator result
  - current_source: reveal handler (conceptual)

outputs:
  - patched_source: conceptual
  - revalidation_target: validator.letter-reveal-correctness

guidance:
  - "Loop all indices when applying correct guess"
  - "Immutable copy of revealed array on update"

validation_notes:
  - Re-run letter-reveal-correctness after repair

risk_notes:
  - Patch breaks win detection

failure_signals:
  - validator.letter-reveal-correctness fail

diagnosis_steps:
  - "Trace reveal handler for single-index bug"
  - "Test target with duplicate letters"

steps:
  - id: step.reveal_all_indices
    action: reveal_all_indices
    detail: "Reveal every index where target equals guessed letter"
  - id: step.immutable_reveal
    action: immutable_reveal
    detail: "Copy revealed array on each update"
  - id: step.re_validate
    action: re_validate
    detail: "Re-run validator.letter-reveal-correctness"

repair_strategy:
  - action: reveal_all_indices
    detail: "Fix duplicate letter reveal"
  - action: immutable_reveal
    detail: "Prevent stale state"
  - action: re_validate
    target: validator.letter-reveal-correctness

guardrails:
  - max_attempts: 2
  - preserve: "Target word and round id"

user_facing_summary: >
  I fixed letter reveals so every matching letter in the word shows up.
