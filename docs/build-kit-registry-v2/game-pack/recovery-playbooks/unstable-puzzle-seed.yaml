id: recovery.unstable-puzzle-seed
kind: recovery_playbook
name: Fix unstable puzzle seed
status: proposed
schema_version: '0.1'
version: 0.1.0-pilot
description: Repairs daily grid puzzles where the selected puzzle changes on reload for the same date seed or free-play id drifts unexpectedly.
non_template_statement: 'Executable recovery strategy spec for a future runner. Not auto-applied today.

  '
max_attempts: 2
applies_to:
- game.daily-puzzle-grid
- tag:daily-puzzle-grid
depends_on:
- mechanic.puzzle-seed
- validator.puzzle-seed-stability
repairs_validators:
- validator.puzzle-seed-stability
inputs:
