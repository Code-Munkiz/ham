- current_source: seed selection logic (conceptual)
outputs:
- patched_source: conceptual
- revalidation_target: validator.puzzle-seed-stability
guidance:
- Use pure function of seed_date and puzzle list index
- Avoid Date.now() or random in daily selection path
- Persist selectedPuzzleId in session state for same-day reload
validation_notes:
- Re-run puzzle-seed-stability after repair
risk_notes:
- Timezone handling still ambiguous after patch
failure_signals:
- validator.puzzle-seed-stability fail
- Different puzzle after refresh same day
- Random puzzle on each mount in daily mode
diagnosis_steps:
- Log seedKey and selectedPuzzleId on init
- Verify selection function is deterministic
- Check for random or time-based noise in seed path
