# Example Cloud Run env file. Copy to `.gcloud/ham-api-env.yaml` (gitignored) and edit.
# Staging SOT: GCP project clarity-staging-488201, region us-central1, service ham-api
# (see docs/DEPLOY_CLOUD_RUN.md). Do NOT put CURSOR_API_KEY here — use Secret Manager + --set-secrets.
# Deploy: gcloud run deploy SERVICE --env-vars-file .gcloud/ham-api-env.yaml ...
#
# Use an env file (not --set-env-vars) so commas in HAM_CORS_ORIGINS are not split by gcloud.

# mock | openrouter (set OPENROUTER_API_KEY via Secret Manager or env) | http
HERMES_GATEWAY_MODE: mock
# For real chat on OpenRouter (BYOK):
# HERMES_GATEWAY_MODE: openrouter
# Use Secret Manager for production; do not commit real keys.
# OPENROUTER_API_KEY: "sk-or-v1-..."
# DEFAULT_MODEL is read from env at runtime if you set here, or rely on repo default in code.

# --- Private Hermes on GCE (HTTP gateway mode) ---
# Browser never calls Hermes; only Ham Cloud Run does, over VPC private routing.
# HERMES_GATEWAY_MODE: http
# Origin only — no /v1 suffix. Use VM internal IP or internal DNS + port (Hermes API default often 8642).
# HERMES_GATEWAY_BASE_URL: "http://10.0.0.5:8642"
# Match Hermes API server bearer; inject via Secret Manager on Cloud Run (recommended), not committed YAML.
# HERMES_GATEWAY_API_KEY: "replace-via-secret-manager"
# Model id your Hermes server expects (code default is hermes-agent).
# HERMES_GATEWAY_MODEL: "hermes-agent"
# Networking: prefer Cloud Run Direct VPC egress to reach the VM; fallback Serverless VPC Access connector.
# See docs/DEPLOY_CLOUD_RUN.md § "Private Hermes on GCE".

# Exact origins (production custom domain + local dev). Add your real Vercel production URL.
# Include the literal token `null` so packaged HAM Desktop (file://) can call the API.
HAM_CORS_ORIGINS: "https://your-app.vercel.app,http://localhost:3000,http://127.0.0.1:3000,null"

# All Vercel preview hostnames (https://*.vercel.app) without listing each deployment.
# Omit in strict production if you only want explicit HAM_CORS_ORIGINS.
HAM_CORS_ORIGIN_REGEX: "https://.*\\.vercel\\.app"

# Hermes runtime skills UI: Cloud Run is not co-located with ~/.hermes — mark remote-only.
# HAM_HERMES_SKILLS_MODE: remote_only

# --- Durable chat sessions (recommended on Cloud Run) ---
# Default sqlite uses container-local disk → ephemeral across revisions. Use Firestore for ?session= deep links.
# HAM_CHAT_SESSION_STORE: firestore
# Optional if Firestore is in the same project as Cloud Run (uses default credentials):
# HAM_CHAT_SESSION_FIRESTORE_PROJECT: clarity-staging-488201
# HAM_CHAT_SESSION_FIRESTORE_COLLECTION: ham_chat_sessions
# If the GCP project has no (default) Firestore DB (e.g. only ai-studio-* DBs), set the database id explicitly:
# HAM_CHAT_SESSION_FIRESTORE_DATABASE: ham-chat-sessions

# --- Hosted workspace storage (PR-1d-B; commented examples only) ---
# Keep Clerk auth enforced in hosted mode.
# HAM_CLERK_REQUIRE_AUTH: "true"
# Local-dev bypass should stay unset/false in hosted deployments.
# HAM_LOCAL_DEV_WORKSPACE_BYPASS: "false"
# Keep workspace routes enabled.
# HAM_WORKSPACE_ROUTES_ENABLED: "true"
# Opt in to Firestore-backed workspace store (default remains file-backed unless explicitly set).
# HAM_WORKSPACE_STORE_BACKEND: firestore
# Firestore project/database for workspace records.
# HAM_FIRESTORE_PROJECT_ID: clarity-staging-488201
# HAM_FIRESTORE_DATABASE: ham-workspaces
# Clerk JWT verification for workspace-scoped routes.
# CLERK_JWT_ISSUER: https://YOUR_INSTANCE.clerk.accounts.dev
# Optional when your Clerk JWT template includes aud:
# CLERK_JWT_AUDIENCE: your-audience

# --- Shared chat attachment storage (Slice B: fix GET /api/chat/attachments/{id} 404s on multi-instance Cloud Run) ---
# Default local disk is ephemeral per instance. Production: use GCS with the same REST contract (no /api/upload).
# Grant the Cloud Run service account storage.objectAdmin on the bucket (narrow to prefix if using IAM conditions).
# HAM_CHAT_ATTACHMENT_STORE: gcs
# HAM_CHAT_ATTACHMENT_BUCKET: your-project-ham-chat-attachments
# Optional object prefix (slashes normalized; trailing / added automatically).
# HAM_CHAT_ATTACHMENT_PREFIX: chat-attachments/

# --- Factory Droid remote runner (RFC1918 only; browser never reaches it) ---
# When ham-api should delegate `droid` execution to a separate runner VM (e.g. ham-droid-runner-1)
# instead of running `droid` in-container, set the runner URL and a stable runner id.
# Use the VM's internal IP (or internal DNS) on the runner port; do NOT include /v1 or any path suffix.
# Cloud Run reaches the VM over Direct VPC egress or a Serverless VPC connector — the same shape as
# the private Hermes setup above (see docs/DEPLOY_CLOUD_RUN.md § "Private Hermes on GCE").
# HAM_DROID_RUNNER_URL: "http://10.0.0.6:8791"
# Stable runner identifier surfaced in audit / telemetry. Keep short and deployment-scoped.
# HAM_DROID_RUNNER_ID: "remote-staging"
# Note: HAM_DROID_RUNNER_TOKEN is the bearer Cloud Run sends with each runner call. It is a
# Secret Manager binding (deploy with `--set-secrets=HAM_DROID_RUNNER_TOKEN=ham-droid-runner-token:latest`),
# not a plain env var — never put the value in this YAML. The deploy script
# (scripts/deploy_ham_api_cloud_run.sh) refuses to deploy without it unless ALLOW_SECRET_DROP=1.
# HAM_DROID_EXEC_TOKEN is intentionally NOT required yet: it is reserved for the future Factory
# Droid Build Lane mutation gate and is not consumed by any live route today.

# --- Durable per-user voice + composer preferences ---
# Default `local` is per-instance JSON under the workspace root → wiped on revision deploy.
# Set Firestore mode so per-user voice and per-(user, workspace) composer preferences survive
# revisions and multi-instance Cloud Run. Reuses the same ADC + database credentials as the
# Firestore workspace/chat stores above; grant the runtime SA roles/datastore.user.
# HAM_VOICE_SETTINGS_STORE: firestore
# Optional overrides (defaults: collection ham_voice_settings, project = service project, db = (default)).
# HAM_VOICE_SETTINGS_FIRESTORE_COLLECTION: ham_voice_settings
# HAM_VOICE_SETTINGS_FIRESTORE_DATABASE: ham-voice-settings
# HAM_CHAT_COMPOSER_PREFS_STORE: firestore
# HAM_CHAT_COMPOSER_PREFS_FIRESTORE_COLLECTION: ham_chat_composer_preferences
# HAM_CHAT_COMPOSER_PREFS_FIRESTORE_DATABASE: ham-chat-composer-prefs

# --- Connected Tools credentials (BYOK OpenRouter / GitHub / Anthropic / OpenAI STT) ---
# Default backend reads/writes a per-instance file → BYOK keys vanish on revision deploy / cold start.
# `auto` selects Firestore whenever HAM_WORKSPACE_STORE_BACKEND=firestore is also set; values are
# encrypted with a Fernet key before being persisted.
# HAM_CONNECTED_TOOLS_CREDENTIAL_BACKEND: auto
# The Fernet encryption key is a Secret Manager binding, never a plain env var. Create
# `ham-connected-tools-encryption-key` (urlsafe base64 32-byte Fernet material), grant the runtime
# service account roles/secretmanager.secretAccessor on it, and mount via
# `--set-secrets=HAM_CONNECTED_TOOLS_CREDENTIAL_ENCRYPTION_KEY=ham-connected-tools-encryption-key:latest`.
# Without this binding the API rejects connect attempts in Firestore mode (no plaintext-at-rest fallback).

# --- Future durable-backend work (env alone is NOT enough) ---
# These two stores are still file-only on Cloud Run and have no backend env switch in code today;
# they require future code changes (Firestore-backed implementations) before they survive revisions:
#   - ProjectStore (~/.ham/projects.json) — holds Build Lane fields `build_lane_enabled` and `github_repo`.
#   - ControlPlaneRunStore (~/.ham/control_plane_runs/) — holds `pr_url`, `pr_branch`, `pr_commit_sha`,
#     `build_outcome`, plus all Cursor + Droid run history.
# Setting the env vars above does NOT make these durable. Treat any Build Lane router (P3/P4/P5) as
# blocked on durable-backend code work for both stores; the runner-side P2 work has no such dependency.
